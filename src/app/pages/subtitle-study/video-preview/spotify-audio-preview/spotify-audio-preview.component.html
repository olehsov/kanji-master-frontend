@if (url) {
    <iframe
            [src]="'https://open.spotify.com/embed/track/' + this.trackId | safe"
            width="100%"
            height="152"
            frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
    </iframe>
}

<div>
    <p>Track ID: {{ trackId }}</p>
    <p>Time: {{ currentTime | number: '1.0-1' }} / {{ duration | number: '1.0-1' }} sec</p>
</div>
